<!-- LOGIN MODAL -->
<div class=""  style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="min-width:420px">
      <div class="card-header">
        <h5 class="card-title"><i class="bi bi-box-arrow-in-right me-2"></i>Welcome Back</h5>
      </div>
      <div class="card-body">
        <p style="color:var(--muted);font-size:0.88rem;margin-bottom:20px;">Sign in to continue to FarmDirect</p>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" [(ngModel)]="loginObj.email" name="email" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between"><label class="form-label">Password</label><a href="#" class="link-green" style="font-size:0.82rem;">Forgot?</a></div>
          <input type="password" [(ngModel)]="loginObj.password" class="form-control" placeholder="Enter password" />
        </div>
        <div class="d-flex align-items-center mb-3">
          <input class="form-check-input me-2" type="checkbox" />
          <label style="font-size:0.85rem;color:var(--muted)">Remember me</label>
        </div>
        <button class="btn-primary-custom" (click)="onLogin()">Sign In</button>
        <div class="divider-text mt-3">or</div>
        <div class="text-center" style="font-size:0.87rem;color:var(--muted)">
          New to FarmDirect? <a href="#" class="link-green" data-bs-dismiss="modal" data-bs-toggle="modal" data-bs-target="#registerModal">Create account</a>
        </div>
      </div>
  </div>
</div>
